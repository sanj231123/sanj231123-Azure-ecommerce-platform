name: Azure Terraform CI

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

  pull_request:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:

  terraform-validation:

    name: Terraform Validate

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform/environments/dev

    steps:

      ############################################################
      # Checkout Repository
      ############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ############################################################
      # Setup Terraform
      ############################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.1

      ############################################################
      # Azure Login (OIDC)
      ############################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ############################################################
      # Terraform Format Check
      ############################################################

      - name: Terraform Format
        run: terraform fmt -check -recursive

      ############################################################
      # Terraform Init
      ############################################################

      - name: Terraform Init
        run: terraform init

      ############################################################
      # Terraform Validate
      ############################################################

      - name: Terraform Validate
        run: terraform validate

      ############################################################
      # Terraform Plan
      ############################################################

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan

      ############################################################
      # Upload Terraform Plan
      ############################################################

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/environments/dev/tfplan

      ############################################################
      # Terraform Summary
      ############################################################

      - name: Terraform Summary
        if: always()
        run: |
          echo "## Terraform Validation Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Format : Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Init   : Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Validate : Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Plan   : Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Terraform Apply is intentionally disabled in GitHub Actions." >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure deployment is performed manually after reviewing the plan." >> $GITHUB_STEP_SUMMARY      
