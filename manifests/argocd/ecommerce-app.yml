apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ecommerce-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sanj231123/Azure-ecommerce-platform.git
    targetRevision: main
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: ecom

  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
