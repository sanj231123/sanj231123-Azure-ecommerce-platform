apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-config
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sanj231123/Azure-ecommerce-platform.git
    targetRevision: main
    path: manifests/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
