apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ecom
  labels:
    app: frontend

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
        version: v1

      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: frontend

          image: acrecommerce231123.azurecr.io/frontend:0d6018e
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "300m"
              memory: "256Mi"
