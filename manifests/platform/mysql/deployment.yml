apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: ecom
  labels:
    app: mysql

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      terminationGracePeriodSeconds: 60

      securityContext:
        fsGroup: 999

      containers:
        - name: mysql

          image: mysql:8.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

            - name: MYSQL_DATABASE
              value: ecommerce

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5

          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
