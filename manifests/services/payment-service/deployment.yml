apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: ecom
  labels:
    app: payment-service

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service
        version: v1

      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: payment-service

          image: acrecommerce231123.azurecr.io/payment-service:d2f8d39
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5007

          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"

            limits:
              cpu: "700m"
              memory: "700Mi"

          env:
            - name: PORT
              value: "5007"

            - name: DB_HOST
              value: "mysql"

            - name: DB_NAME
              value: "ecommerce"

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: DB_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: JWT_SECRET

            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: RAZORPAY_KEY_ID

            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: RAZORPAY_KEY_SECRET
