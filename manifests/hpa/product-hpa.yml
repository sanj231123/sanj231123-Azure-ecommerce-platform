apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: product-service-hpa
  namespace: ecom

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service

  minReplicas: 1

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:
        type: Utilization
        averageUtilization: 50

  - type: Resource

    resource:

      name: memory

      target:
        type: Utilization
        averageUtilization: 70
