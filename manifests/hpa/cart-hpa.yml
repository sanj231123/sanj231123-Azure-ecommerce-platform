apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: cart-service-hpa
  namespace: ecom

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart-service

  minReplicas: 1

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:
        type: Utilization
        averageUtilization: 50
